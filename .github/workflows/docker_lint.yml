name: Docker Lint

on:
  workflow_dispatch:
    
jobs:
  validate_dockerfile:
   runs-on: ubuntu-latest
   steps:
     - name: Code Checkout
       uses: actions/checkout@v5

     - name: Lint Dockerfile
       uses: hadolint/hadolint-action@v3.3.0
       with:
         dockerfile: Dockerfile
         
     - name: install yamllint
       run: pip install yamllint

      
     - name: Run yamllint
       run: yamllint docker-compose.yml
       
