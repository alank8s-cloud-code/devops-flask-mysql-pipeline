name: Gitleaks Scan

on: workflow_dispatch

jobs:
  Secret_Scan:
   runs-on: ubuntu-latest
   steps:
     - name: Code Checkout
       uses: actions/checkout@v5
       with:
         fetch-depth: 0

     - name: Secrets Scan
       uses: gitleaks/gitleaks-actions@v2
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
