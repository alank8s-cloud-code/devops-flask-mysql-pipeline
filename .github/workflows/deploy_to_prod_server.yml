name: Deploy to Production Server

on: workflow_dispatch

jobs:
  deploy_to_prod_server:
   runs-on: ubuntu-latest
   steps:
     - name: Code Checkout
       uses: actions/checkout@v5

     - name: Deploy to prod server && create a folder DevOps
       uses: appleboy/ssh-action@v1.0.3
       with:
         version: latest
         host: ${{ secrets.PROD_HOST }}
         username: ${{ secrets.EC2_SSH_USER }}
         key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
         scripts: | 
          echo " Installing package and create foler"
          sudo apt-get update && sudo apt-get upgrade -y 
          sudo apt-get install docker docker-compose-v2 -y
          sudo usermod -aG $USER || true
          mkdir -p devops

     - name: Copy the docker compose file
       uses: appleboy/ssh-action@v1.0.3
       with:
         version: latest
         host: ${{ secrets.PROD_HOST }}
         username: ${{ secrets.EC2_SSH_USER }}
         key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
         source: docker-compose.yml
         target: ~/devops 
      
     - name: Run the application on the production server
       uses: appleboy/ssh-action@v1.0.3
       with:
         version: latest
         host: ${{ secrets.PROD_HOST }}
         username: ${{ secrets.EC2_SSH_USER }}
         key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
         scripts: | 
          echo " Run the application "
          
          sudo apt-get install docker docker-compose-v2 -y
          sudo usermod -aG $USER || true
          mkdir -p devops
