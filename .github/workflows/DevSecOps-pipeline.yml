name: DevSecOps end-to-end workflow
on:
    push:
        branches: [main]
    workflow_dispatch:
jobs:
    code-quality-scan:
        uses: ./.github/workflows/code-quality.yml

    dependency-check-scan:
        uses: ./.github/workflows/dependencies-scan.yml

    dockerfile-scan:
        uses: ./.github/workflows/dockerfile-scan.yml

    secrets-scan:
        uses: ./.github/workflows/secrets-scan.yml

    docker-build-push:
        needs:
            [
                code-quality-scan,
                dependency-check-scan,
                dockerfile-scan,
                secrets-scan,
            ]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

    image-scan:
        needs: [docker-build-push]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    deploy-to-prod-server:
        needs: [image-scan]
        uses: ./.github/workflows/deploy-to-prod-server.yml
        secrets: inherit
