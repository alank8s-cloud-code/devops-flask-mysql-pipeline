---
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_container
    ports:
      - "3306:3306"
    networks:
      - todo-net
    volumes:
      - todo_db:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: suraj
      MYSQL_PASSWORD: "suraj**845"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - "-h"
        - localhost
        - "-usuraj"
        - "-psuraj**845"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  flask:
    image: "${DOCKERHUB_USER}/todo-flask-mysql-app:${DOCKER_TAG}"
    container_name: flask-webapp
    ports:
      - "5000:5000"
    networks:
      - todo-net
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: suraj
      MYSQL_PASSWORD: "suraj**845"
      MYSQL_DATABASE: mydb
      SECRET_KEY: "suraj-874**99881@123"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  todo_db: {}

networks:
  todo-net:
    driver: bridge
